services:
  postgres:
    image: postgres:16-alpine
    container_name: wfa_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: wfa_user
      POSTGRES_PASSWORD: wfa_password
      POSTGRES_DB: wfa_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: wfa_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: